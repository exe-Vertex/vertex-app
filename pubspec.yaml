name: vertex_mobile
description: "Vertex - Project Management Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP & API
  http: ^1.4.0
  
  # State Management
  provider: ^6.1.0
  
  # Navigation  
  go_router: ^14.0.0
  
  # Storage
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.0
  
  # UI
  google_fonts: ^6.2.0
  flutter_svg: ^2.0.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.0
  
  # Icons
  lucide_icons: ^0.257.0
  
  # Deep link
  app_links: ^6.1.1
  
  # Utils
  intl: ^0.19.0
  timeago: ^3.7.0
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
